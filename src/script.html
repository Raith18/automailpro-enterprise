<script>
  /**
   * Escapes HTML special characters for safe innerHTML injection of
   * server-provided strings (recipient names, subjects, etc.).
   */
  function escapeHtml(str) {
    if (str === null || str === undefined) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  /** Shows a lightweight "coming soon" panel in the content area. */
  function renderComingSoon(pageName) {
    document.getElementById('content').innerHTML =
      '<div class="coming-soon">' + escapeHtml(pageName) +
      ' is not built yet in this project — it ships in a later module.</div>';
  }

  /** Shared error display for any page's google.script.run failure handler. */
  function showLoadError(pageName, err) {
    document.getElementById('content').innerHTML =
      '<div class="coming-soon">Could not load ' + escapeHtml(pageName) + ': ' + escapeHtml(err.message || err) + '</div>';
  }
</script>
