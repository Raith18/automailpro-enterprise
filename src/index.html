<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <?!= include('style'); ?>
</head>
<body>
  <div class="header" style="background: #2874f0; color: #ffffff; padding: 12px 16px; font-size: 16px; font-style: italic; font-weight: bold; position: sticky; top: 0; z-index: 10;">
    SmartMail<span style="color: #ffe11b;">Scheduler</span>
  </div>
  <div class="nav">
    <div class="nav-item active" id="nav-dashboard" onclick="goTo('dashboard')">Dashboard</div>
    <div class="nav-item" id="nav-scheduler" onclick="goTo('scheduler')">Schedule</div>
    <div class="nav-item" id="nav-templates" onclick="goTo('templates')">Templates</div>
    <div class="nav-item" id="nav-logs" onclick="goTo('logs')">Logs</div>
    <div class="nav-item" id="nav-reports" onclick="goTo('reports')">Reports</div>
    <div class="nav-item" id="nav-queue" onclick="goTo('queue')">Queue</div>
    <div class="nav-item" id="nav-settings" onclick="goTo('settings')">Settings</div>
    <div class="nav-item" id="nav-about" onclick="goTo('about')">About</div>
  </div>
  <div id="role-banner" style="display:none; font-size:11px; color:#5f6368; padding:6px 12px; border-bottom:1px solid #e0e0e0;"></div>
  <div id="content" class="content">
    <div class="loading">Loading dashboard&hellip;</div>
  </div>

  <div class="developer-footer">
    Engineered by <strong>Shaik Mohammad Raith</strong><br>
    <span class="email-text">mohammadraith022@gmail.com</span>
  </div>

  <?!= include('script'); ?>
  <?!= include('dashboard'); ?>
  <?!= include('scheduler'); ?>
  <?!= include('templates'); ?>
  <?!= include('logs'); ?>
  <?!= include('reports'); ?>
  <?!= include('settings'); ?>
  <?!= include('about'); ?>
  <?!= include('queue'); ?>
  <script>
    // Maps each nav tab to the permission required to use it. A tab with
    // no entry here (Dashboard, Logs, About) is available to every role —
    // matches AuthService.PERMISSIONS.Viewer, which only guarantees 'view'.
    const NAV_PERMISSION = {
      scheduler: 'schedule',
      templates: 'editTemplates',
      reports: 'viewReports',
      queue: 'retry',
      settings: 'editSettings'
    };

    let _currentAccess = null;

    function goTo(page) {
      if (NAV_PERMISSION[page] && _currentAccess && !_currentAccess.can[NAV_PERMISSION[page]]) {
        renderComingSoon('This section (role: ' + _currentAccess.role + ')');
        return;
      }
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      const el = document.getElementById('nav-' + page);
      if (el) el.classList.add('active');
      if (page === 'dashboard') loadDashboard();
      if (page === 'scheduler') renderScheduler();
      if (page === 'templates') renderTemplates();
      if (page === 'logs') renderLogs();
      if (page === 'reports') renderReports();
      if (page === 'settings') renderSettings();
      if (page === 'about') renderAbout();
      if (page === 'queue') renderQueue();
    }

    /**
     * Fetches the current user's role/permissions and visually disables
     * any nav tab they can't use — closes the gap where AuthService
     * computed permissions server-side but nothing enforced them here.
     */
    function applyRoleRestrictions(access) {
      _currentAccess = access;
      Object.keys(NAV_PERMISSION).forEach(page => {
        const el = document.getElementById('nav-' + page);
        if (!el) return;
        if (!access.can[NAV_PERMISSION[page]]) {
          el.classList.add('disabled');
          el.title = 'Requires higher permissions than your role (' + access.role + ')';
        }
      });
      const banner = document.getElementById('role-banner');
      if (access.role === 'Viewer') {
        banner.style.display = 'block';
        banner.innerText = 'Viewing as: Viewer (read-only). Contact an Admin for edit access.';
      }
    }

    function loadDashboard() {
      document.getElementById('content').innerHTML = '<div class="loading">Loading dashboard&hellip;</div>';
      google.script.run
        .withSuccessHandler(renderDashboard)
        .withFailureHandler(err => {
          document.getElementById('content').innerHTML =
            '<div class="coming-soon">Could not load dashboard: ' + escapeHtml(err.message || err) + '</div>';
        })
        .getDashboardData();
    }

    google.script.run.withSuccessHandler(applyRoleRestrictions).getCurrentUserAccess();

    // Jump straight to whichever tab Menu.gs's menuOpenSidebar(page) asked
    // for (e.g. Settings), defaulting to Dashboard when opened plainly.
    const _initialPage = '<?= (typeof initialPage !== "undefined" && initialPage) ? initialPage : "dashboard" ?>';
    goTo(_initialPage);
  </script>
</body>
</html>
