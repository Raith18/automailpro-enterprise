<script>
  /**
   * Renders the "Schedule Emails" form. Template dropdown is populated
   * live from the server so new templates appear automatically.
   */
  function renderScheduler() {
    document.getElementById('content').innerHTML = '<div class="loading">Loading form&hellip;</div>';
    google.script.run
      .withSuccessHandler(buildSchedulerForm)
      .withFailureHandler(err => {
        document.getElementById('content').innerHTML =
          '<div class="coming-soon">Could not load templates: ' + escapeHtml(err.message || err) + '</div>';
      })
      .getActiveTemplateNames();
  }

  function buildSchedulerForm(templateNames) {
    const today = new Date().toISOString().slice(0, 10);
    const templateOptions = templateNames.length > 0
      ? templateNames.map(t => '<option value="' + escapeHtml(t) + '">' + escapeHtml(t) + '</option>').join('')
      : '<option value="">No active templates found</option>';

    const html = `
      <div class="card">
        <h3>Schedule a new email</h3>
        <div id="form-errors"></div>

        <label class="field-label">Recipient email *</label>
        <input id="f-email" type="email" class="field-input" placeholder="name@company.com">

        <label class="field-label">Recipient name</label>
        <input id="f-name" type="text" class="field-input" placeholder="Optional">

        <label class="field-label">Subject override</label>
        <input id="f-subject" type="text" class="field-input" placeholder="Leave blank to use template subject">

        <label class="field-label">Template *</label>
        <select id="f-template" class="field-input">${templateOptions}</select>

        <div style="display:flex; gap:8px;">
          <div style="flex:1;">
            <label class="field-label">Date *</label>
            <input id="f-date" type="date" class="field-input" value="${today}">
          </div>
          <div style="flex:1;">
            <label class="field-label">Time *</label>
            <input id="f-time" type="time" class="field-input" value="09:00">
          </div>
        </div>

        <label class="field-label">Priority</label>
        <select id="f-priority" class="field-input">
          <option value="Normal" selected>Normal</option>
          <option value="Low">Low</option>
          <option value="High">High</option>
          <option value="Urgent">Urgent</option>
        </select>

        <label class="field-label">Attachment Drive File ID(s)</label>
        <input id="f-attachment" type="text" class="field-input" placeholder="Optional, comma-separated">

        <button id="f-submit" class="btn-primary" onclick="submitSchedulerForm()">Schedule email</button>
        <div id="form-status" style="margin-top:8px; font-size:12px;"></div>
      </div>
    `;
    document.getElementById('content').innerHTML = html;
  }

  function submitSchedulerForm() {
    const data = {
      recipientEmail: document.getElementById('f-email').value.trim(),
      recipientName: document.getElementById('f-name').value.trim(),
      subject: document.getElementById('f-subject').value.trim(),
      templateName: document.getElementById('f-template').value,
      scheduleDate: document.getElementById('f-date').value,
      scheduleTime: document.getElementById('f-time').value,
      priority: document.getElementById('f-priority').value,
      attachmentFileId: document.getElementById('f-attachment').value.trim()
    };

    const btn = document.getElementById('f-submit');
    btn.disabled = true;
    btn.innerText = 'Scheduling…';
    document.getElementById('form-errors').innerHTML = '';
    document.getElementById('form-status').innerText = '';

    google.script.run
      .withSuccessHandler(res => {
        btn.disabled = false;
        btn.innerText = 'Schedule email';
        if (res.success) {
          document.getElementById('form-status').innerHTML =
            '<span style="color:#188038;">Scheduled successfully — ID ' + escapeHtml(res.id) + '</span>';
          // Clear the fields most likely to change between entries.
          document.getElementById('f-email').value = '';
          document.getElementById('f-name').value = '';
          document.getElementById('f-subject').value = '';
        } else {
          document.getElementById('form-errors').innerHTML =
            '<div class="coming-soon" style="color:#d93025; text-align:left; padding:8px 0;">' +
            res.errors.map(e => '&bull; ' + escapeHtml(e)).join('<br>') +
            '</div>';
        }
      })
      .withFailureHandler(err => {
        btn.disabled = false;
        btn.innerText = 'Schedule email';
        document.getElementById('form-status').innerHTML =
          '<span style="color:#d93025;">Error: ' + escapeHtml(err.message || err) + '</span>';
      })
      .submitNewSchedule(data);
  }
</script>
