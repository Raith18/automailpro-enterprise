<script src="https://www.gstatic.com/charts/loader.js"></script>
<script>
  google.charts.load('current', { packages: ['corechart'] });

  /**
   * Renders the full dashboard given the payload from getDashboardData().
   * @param {Object} data
   */
  function renderDashboard(data) {
    const c = data.counts;
    const quotaText = data.quota.remaining !== null ? data.quota.remaining : 'Unknown';

    let html = '';

    html += '<div class="stat-grid">';
    html += statBox(c.pending, 'Pending', '');
    html += statBox(c.today, "Today's emails", '');
    html += statBox(c.failed, 'Failed', c.failed > 0 ? 'warn' : 'ok');
    html += statBox(c.successRate !== null ? c.successRate + '%' : '&mdash;', 'Success rate', '');
    html += statBox(c.retryQueue, 'Retry queue', '');
    html += statBox(quotaText, 'Quota remaining', '');
    html += '</div>';

    html += '<div class="card"><h3>Upcoming scheduled emails</h3><div id="upcoming-list">';
    html += data.upcoming.length === 0
      ? '<div class="muted">Nothing scheduled.</div>'
      : data.upcoming.map(u =>
          '<div class="list-row"><span>' + escapeHtml(u.recipient) + '<br><span class="muted">' + escapeHtml(u.subject) + '</span></span>' +
          '<span class="muted">' + escapeHtml(u.scheduledAt) + '</span></div>'
        ).join('');
    html += '</div></div>';

    html += '<div class="card"><h3>Recent activity</h3><div id="recent-list">';
    html += data.recentActivity.length === 0
      ? '<div class="muted">No activity yet.</div>'
      : data.recentActivity.map(r =>
          '<div class="list-row"><span>' + escapeHtml(r['Recipient']) + '<br><span class="muted">' + escapeHtml(r['Subject'] || '') + '</span></span>' +
          '<span class="badge ' + escapeHtml(r['Status']) + '">' + escapeHtml(r['Status']) + '</span></div>'
        ).join('');
    html += '</div></div>';

    html += '<div class="card"><h3>Daily sending trend (7 days)</h3><div id="chart-daily" style="height:140px"></div></div>';
    html += '<div class="card"><h3>Success vs failure</h3><div id="chart-sf" style="height:140px"></div></div>';
    html += '<div class="card"><h3>Priority distribution</h3><div id="chart-priority" style="height:140px"></div></div>';
    html += '<div class="card"><h3>Monthly emails (6 months)</h3><div id="chart-monthly" style="height:140px"></div></div>';

    document.getElementById('content').innerHTML = html;

    google.charts.setOnLoadCallback(() => drawCharts(data.charts));
  }

  function statBox(value, label, cls) {
    return '<div class="stat-box ' + (cls || '') + '"><div class="stat-value">' + value +
      '</div><div class="stat-label">' + escapeHtml(label) + '</div></div>';
  }

  function drawCharts(charts) {
    // Daily trend — line chart
    const dailyData = new google.visualization.DataTable();
    dailyData.addColumn('string', 'Day');
    dailyData.addColumn('number', 'Sent');
    charts.dailyTrend.forEach(d => dailyData.addRow([d.label, d.count]));
    new google.visualization.LineChart(document.getElementById('chart-daily'))
      .draw(dailyData, chartOptions());

    // Success vs failure — pie chart
    const sfData = new google.visualization.DataTable();
    sfData.addColumn('string', 'Result');
    sfData.addColumn('number', 'Count');
    sfData.addRow(['Sent', charts.successVsFailure.sent]);
    sfData.addRow(['Failed', charts.successVsFailure.failed]);
    new google.visualization.PieChart(document.getElementById('chart-sf'))
      .draw(sfData, Object.assign(chartOptions(), { colors: ['#188038', '#d93025'] }));

    // Priority distribution — pie chart
    const prioData = new google.visualization.DataTable();
    prioData.addColumn('string', 'Priority');
    prioData.addColumn('number', 'Count');
    Object.keys(charts.priorityDistribution).forEach(p => prioData.addRow([p, charts.priorityDistribution[p]]));
    new google.visualization.PieChart(document.getElementById('chart-priority'))
      .draw(prioData, chartOptions());

    // Monthly — bar chart
    const monthlyData = new google.visualization.DataTable();
    monthlyData.addColumn('string', 'Month');
    monthlyData.addColumn('number', 'Sent');
    charts.monthly.forEach(m => monthlyData.addRow([m.label, m.count]));
    new google.visualization.ColumnChart(document.getElementById('chart-monthly'))
      .draw(monthlyData, chartOptions());
  }

  function chartOptions() {
    return {
      legend: { position: 'none' },
      chartArea: { width: '85%', height: '75%' },
      colors: ['#2874f0'],
      titleTextStyle: { fontSize: 12 },
      hAxis: { textStyle: { fontSize: 10 } },
      vAxis: { textStyle: { fontSize: 10 } }
    };
  }
</script>
